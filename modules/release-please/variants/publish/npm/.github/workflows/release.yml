name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  # id-token: write is the load-bearing permission for npm Trusted
  # Publishing via OIDC. The npm CLI exchanges the GitHub OIDC token
  # for short-lived publish credentials at registry.npmjs.org — no
  # NPM_TOKEN secret, no long-lived credential to rotate.
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish
        # Trusted Publishing requires npm CLI >= 11.5.1. Node 22 LTS
        # bundles npm 10.x, but `npm install -g npm@latest` hits a
        # known self-update bug (can't atomically replace the running
        # npm — fails with MODULE_NOT_FOUND for promise-retry). Side-
        # step it via `npx --yes npm@latest publish`: a fresh npm is
        # downloaded for this single invocation, leaving the runner's
        # bundled npm untouched. No --provenance flag needed under
        # Trusted Publishing; provenance attestations are automatic.
        # --access public required for free-tier scoped packages.
        run: npx --yes npm@latest publish --access public
