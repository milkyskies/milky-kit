name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    # NPM_TOKEN is a granular automation token scoped to the publish org
    # with read+write on the relevant packages. `npm publish --provenance`
    # uses GitHub's OIDC for the actual trust, but the npm CLI's auth check
    # still wants NODE_AUTH_TOKEN set.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish
        # `--access public` is required for scoped packages on the free npm
        # tier. `--provenance` records the GitHub Actions context (commit
        # SHA, workflow run) into the published package metadata so
        # consumers can verify it came from this repo.
        run: npm publish --access public --provenance
