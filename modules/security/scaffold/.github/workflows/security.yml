name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly so newly-disclosed CVEs against unchanged
    # dependencies get caught even when nothing in the repo changed.
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  osv-scanner:
    name: OSV-Scanner
    permissions:
      contents: read
      security-events: write
      actions: read
    # Reusable workflow auto-detects lockfiles (pnpm-lock.yaml, bun.lock,
    # bun.lockb, Cargo.lock, package-lock.json, go.sum, requirements.txt, etc.).
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      # `upload-sarif: false` skips the Security tab integration, which
      # requires GitHub Code Security / Advanced Security (paid on private
      # repos). Flip to true if you have that.
      upload-sarif: false

  zizmor:
    name: zizmor (GitHub Actions static analysis)
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Symmetric with osv-scanner's upload-sarif: false above. Code
          # Scanning requires GitHub Advanced Security (paid on private
          # repos); without it the SARIF upload step fails the job. Flip
          # advanced-security: true if you have GHAS enabled.
          advanced-security: false
          annotations: true
