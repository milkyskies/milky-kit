version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    cooldown:
      # Mirrors .npmrc minimum-release-age (24h). Dependabot won't propose
      # versions inside the cooldown window so it never suggests something
      # pnpm would refuse to install.
      # zizmor flags <7d as `dependabot-cooldown` — intentional mismatch
      # documented in .claude/rules/security.md.
      default-days: 1 # zizmor: ignore[dependabot-cooldown]
      semver-major-days: 1
      semver-minor-days: 1
      semver-patch-days: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown]
      semver-major-days: 1
      semver-minor-days: 1
      semver-patch-days: 1
