services:
  db:
    image: postgis/postgis:16-3.4
    container_name: {{project_name}}-db
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: {{project_name}}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
