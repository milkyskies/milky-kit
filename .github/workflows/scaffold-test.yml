name: scaffold-test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  scaffold:
    name: scaffold integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('scripts/scaffold-fixtures/**/milky-kit.toml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Aikido safe-chain
        # Installs PATH shims that intercept pnpm/npm/yarn/npx and check
        # every package against Aikido's feed of known-malicious releases
        # before the install runs. MUST come before pnpm install in the
        # fixture script so the shims are on PATH when packages are fetched.
        env:
          npm_config_minimum_release_age: "0"
        run: pnpm dlx @aikidosec/safe-chain@1.5.1 setup-ci

      - name: Run scaffold integration test
        run: bash scripts/test-scaffold.sh
