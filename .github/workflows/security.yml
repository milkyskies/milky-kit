name: Security

# Kit-self-apply: mirrors modules/security/scaffold/.github/workflows/security.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan weekly so newly-disclosed CVEs against unchanged
    # dependencies get caught even when nothing in the repo changed.
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor (GitHub Actions static analysis)
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          # Scan the kit's own workflows plus every scaffolded workflow shipped
          # by modules. Catches drift (e.g. an unpinned `uses:` slipping into a
          # module's scaffold) before it propagates to consuming projects.
          inputs: |
            .github/workflows/
            modules/bun/scaffold/.github/workflows/
            modules/pnpm/scaffold/.github/workflows/
            modules/release-please/scaffold/.github/workflows/
            modules/release-please/variants/publish/none/.github/workflows/
            modules/release-please/variants/publish/npm/.github/workflows/
            modules/security/scaffold/.github/workflows/
